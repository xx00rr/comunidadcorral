<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — ComunidadCorral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
<div class="container" style="max-width:380px">
  <div class="card shadow-sm border-0 rounded-4 p-4 mt-5">
    <h4 class="fw-bold mb-1">ComunidadCorral</h4>
    <p class="text-secondary mb-4 small">Administración de viviendas</p>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label small fw-semibold">{{ field.label }}</label>
        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
               class="form-control {% if field.errors %}is-invalid{% endif %}"
               {% if field.value %}value="{{ field.value }}"{% endif %}>
        {% for err in field.errors %}<div class="invalid-feedback">{{ err }}</div>{% endfor %}
      </div>
      {% endfor %}
      <button class="btn btn-dark w-100 mt-1" type="submit">Ingresar</button>
    </form>
  </div>
</div>
</body>
</html>
