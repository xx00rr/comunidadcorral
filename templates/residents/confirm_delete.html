{% extends 'base.html' %}
{% block title %}Eliminar residente{% endblock %}
{% block content %}
<div class="card border-0 bg-white p-4 mt-3" style="max-width:480px">
  <h5 class="fw-bold mb-2">Eliminar residente</h5>
  <p>¿Seguro que quieres eliminar a <strong>{{ resident.full_name }}</strong>?</p>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Sí, eliminar</button>
    <a href="{% url 'resident_detail' resident.pk %}" class="btn btn-outline-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
