{% extends 'base.html' %}
{% block title %}Editar organización{% endblock %}
{% block content %}
<h5 class="fw-bold mb-4">Editar organización</h5>
<div class="card border-0 bg-white p-4" style="max-width:520px">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label small fw-semibold">{{ field.label }}</label>
      {{ field }}
      {% for err in field.errors %}<div class="text-danger small">{{ err }}</div>{% endfor %}
    </div>
    {% endfor %}
    <div class="d-flex gap-2 mt-2">
      <button class="btn btn-dark" type="submit">Guardar</button>
      <a href="{% url 'org_detail' %}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
